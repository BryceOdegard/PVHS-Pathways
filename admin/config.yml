backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

# Shared field definitions
sequence_fields: &sequence_fields
  - label: "Program Title"
    name: "title"
    widget: "string"
  - label: "Category Tag"
    name: "tag"
    widget: "string"
    hint: "Short label, e.g. Trades, Technology, Education"
  - label: "Description"
    name: "desc"
    widget: "text"
  - label: "Courses"
    name: "courses"
    widget: "list"
    field:
      label: "Course Name"
      name: "course"
      widget: "string"
  - label: "Post-Secondary Pathways"
    name: "postsec"
    widget: "list"
    fields:
      - { label: "Type (e.g. Community College)", name: "type", widget: "string" }
      - { label: "Program / Credential Name", name: "name", widget: "string" }
      - { label: "Description", name: "note", widget: "text" }
      - { label: "Link URL (optional)", name: "url", widget: "string", required: false, default: "" }
  - label: "Career Opportunities"
    name: "careers"
    widget: "list"
    fields:
      - { label: "Job Title", name: "title", widget: "string" }
      - { label: "Median Salary (e.g. $56,000)", name: "salary", widget: "string" }
      - { label: "Job Growth (e.g. +8%)", name: "outlook", widget: "string" }
      - { label: "Description", name: "desc", widget: "text" }
  - label: "Financial Aid & Scholarships"
    name: "financial"
    widget: "list"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - { label: "Description", name: "note", widget: "text" }
      - { label: "Link URL (optional)", name: "url", widget: "string", required: false, default: "" }

collections:

  # ── CAREER SEQUENCES (one file per program) ────────────────
  - name: "sequences"
    label: "📚 Career Sequences"
    folder: "_sequences"
    create: false
    slug: "{{num}}-{{id}}"
    format: "json"
    extension: "json"
    identifier_field: "id"
    fields:
      - { label: "ID (do not change)", name: "id", widget: "string" }
      - { label: "Number (do not change)", name: "num", widget: "string" }
      - { label: "Emoji Icon", name: "icon", widget: "string", hint: "Paste an emoji, e.g. 🏗️" }
      - { label: "Accent Color", name: "color", widget: "color" }
      - { label: "Sort Order", name: "order", widget: "number" }
      - label: "🇺🇸 English Content"
        name: "en"
        widget: "object"
        fields: *sequence_fields
      - label: "🇲🇽 Spanish Content"
        name: "es"
        widget: "object"
        fields: *sequence_fields

  # ── SITE LABELS ────────────────────────────────────────────
  - name: "site_labels"
    label: "🔤 Site Labels & Headlines"
    files:
      - name: "ui"
        label: "Page Text (Hero, Footer, Buttons)"
        file: "_data/ui.json"
        fields:
          - label: "🇺🇸 English"
            name: "en"
            widget: "object"
            fields:
              - { label: "Hero eyebrow text", name: "hero_label", widget: "string" }
              - { label: "Hero line 1", name: "hero_line1", widget: "string" }
              - { label: "Hero line 2 (gradient)", name: "hero_line2", widget: "string" }
              - { label: "Hero subtitle", name: "hero_sub", widget: "text" }
              - { label: "Footer brand name", name: "footer_brand", widget: "string" }
              - { label: "Footer tagline", name: "footer_note", widget: "string" }
              - label: "Navigation labels (must stay in order)"
                name: "nav"
                widget: "list"
                field: { label: "Label", name: "label", widget: "string" }
          - label: "🇲🇽 Spanish"
            name: "es"
            widget: "object"
            fields:
              - { label: "Hero eyebrow text", name: "hero_label", widget: "string" }
              - { label: "Hero line 1", name: "hero_line1", widget: "string" }
              - { label: "Hero line 2 (gradient)", name: "hero_line2", widget: "string" }
              - { label: "Hero subtitle", name: "hero_sub", widget: "text" }
              - { label: "Footer brand name", name: "footer_brand", widget: "string" }
              - { label: "Footer tagline", name: "footer_note", widget: "string" }
              - label: "Navigation labels (must stay in order)"
                name: "nav"
                widget: "list"
                field: { label: "Label", name: "label", widget: "string" }

  # ── ABOUT PAGE ─────────────────────────────────────────────
  - name: "about"
    label: "👋 About PVHS Pathways"
    files:
      - name: "about"
        label: "About Page Content"
        file: "_data/about.json"
        fields:
          - label: "🇺🇸 English"
            name: "en"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Body Text", name: "body", widget: "markdown" }
              - label: "Highlight Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Value (e.g. 8 or 100+)", name: "value", widget: "string" }
                  - { label: "Label (e.g. Career Sequences)", name: "label", widget: "string" }
          - label: "🇲🇽 Spanish"
            name: "es"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
              - { label: "Body Text", name: "body", widget: "markdown" }
              - label: "Highlight Stats"
                name: "stats"
                widget: "list"
                fields:
                  - { label: "Value", name: "value", widget: "string" }
                  - { label: "Label", name: "label", widget: "string" }

  # ── PRESENTERS ─────────────────────────────────────────────
  - name: "presenters_page"
    label: "🎤 Presenter Bios"
    files:
      - name: "presenters"
        label: "Presenters"
        file: "_data/presenters.json"
        fields:
          - label: "🇺🇸 English Page Labels"
            name: "en"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
          - label: "🇲🇽 Spanish Page Labels"
            name: "es"
            widget: "object"
            fields:
              - { label: "Page Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string" }
          - label: "Presenters"
            name: "presenters"
            widget: "list"
            summary: "{{fields.name}} — {{fields.role}}"
            fields:
              - { label: "Full Name", name: "name", widget: "string" }
              - { label: "Title / Role", name: "role", widget: "string" }
              - { label: "Bio", name: "bio", widget: "text" }
              - { label: "Photo", name: "image", widget: "image", required: false, default: "" }
              - label: "Associated Sequence (optional)"
                name: "sequence"
                widget: "select"
                required: false
                default: ""
                options:
                  - { label: "None", value: "" }
                  - { label: "Building Construction Technology", value: "construction" }
                  - { label: "Automotive Technology", value: "automotive" }
                  - { label: "Teaching and Training", value: "education" }
                  - { label: "Early Childhood", value: "earlychildhood" }
                  - { label: "Computer Science", value: "cs" }
                  - { label: "Cybersecurity", value: "cyber" }
                  - { label: "Culinary Arts", value: "culinary" }
                  - { label: "Theatre Technology", value: "theatre" }
              - { label: "Contact / Email (optional)", name: "contact", widget: "string", required: false, default: "" }
